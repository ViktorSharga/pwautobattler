name: Build and Release

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore autobattler.sln
      
    - name: Build Debug
      run: dotnet build autobattler.sln --configuration Debug --no-restore
      
    - name: Build Release
      run: dotnet build autobattler.sln --configuration Release --no-restore
      
    - name: Publish self-contained Release (win-x64)
      run: |
        dotnet publish GameAutomation.csproj --configuration Release --runtime win-x64 --self-contained true --output ./publish/win-x64 --verbosity normal -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:DebugType=None -p:DebugSymbols=false
          
    - name: Publish framework-dependent Release (win-x64)
      run: |
        dotnet publish GameAutomation.csproj --configuration Release --runtime win-x64 --self-contained false --output ./publish/win-x64-framework --verbosity normal
          
    - name: List published files (self-contained)
      run: dir "publish\win-x64" /s
        
    - name: List published files (framework-dependent)
      run: dir "publish\win-x64-framework" /s
        
    - name: Test executable (self-contained)
      shell: cmd
      run: |
        if exist "publish\win-x64\GameAutomation.exe" (
          echo Executable found and ready
          dir "publish\win-x64\GameAutomation.exe"
        ) else (
          echo ERROR: Executable not found
          exit /b 1
        )
        
    - name: Create artifacts directory
      run: if not exist artifacts mkdir artifacts
        
    - name: Package self-contained release
      run: powershell Compress-Archive -Path "./publish/win-x64/*" -DestinationPath "./artifacts/GameAutomation-SelfContained-win-x64.zip"
        
    - name: Package framework-dependent release
      run: powershell Compress-Archive -Path "./publish/win-x64-framework/*" -DestinationPath "./artifacts/GameAutomation-FrameworkDependent-win-x64.zip"
        
    - name: Upload self-contained artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameAutomation-SelfContained-win-x64
        path: ./artifacts/GameAutomation-SelfContained-win-x64.zip
        retention-days: 90
        
    - name: Upload framework-dependent artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameAutomation-FrameworkDependent-win-x64
        path: ./artifacts/GameAutomation-FrameworkDependent-win-x64.zip
        retention-days: 90
        
    - name: Upload release assets (on release)
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./artifacts/GameAutomation-SelfContained-win-x64.zip
        asset_name: GameAutomation-SelfContained-win-x64.zip
        asset_content_type: application/zip