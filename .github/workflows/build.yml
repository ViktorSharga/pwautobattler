name: Build and Release

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore GameAutomation.csproj
      
    - name: Build Release
      run: dotnet build GameAutomation.csproj --configuration Release --no-restore
      
    - name: Publish self-contained executable
      run: dotnet publish GameAutomation.csproj -c Release -r win-x64 --self-contained true -o publish/self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
      
    - name: Publish framework-dependent
      run: dotnet publish GameAutomation.csproj -c Release -r win-x64 --self-contained false -o publish/framework-dependent
      
    - name: Verify self-contained build
      run: |
        if (Test-Path "publish/self-contained/GameAutomation.exe") {
          Write-Host "✅ Self-contained executable created successfully"
          $size = (Get-Item "publish/self-contained/GameAutomation.exe").Length
          Write-Host "📁 Size: $([math]::Round($size/1MB, 2)) MB"
        } else {
          Write-Host "❌ Self-contained executable not found"
          exit 1
        }
      shell: pwsh
      
    - name: Verify framework-dependent build  
      run: |
        if (Test-Path "publish/framework-dependent/GameAutomation.exe") {
          Write-Host "✅ Framework-dependent executable created successfully"
        } else {
          Write-Host "❌ Framework-dependent executable not found"
          exit 1
        }
      shell: pwsh
        
    - name: Create release packages
      run: |
        New-Item -ItemType Directory -Force -Path "artifacts"
        Compress-Archive -Path "publish/self-contained/*" -DestinationPath "artifacts/GameAutomation-SelfContained-win-x64.zip"
        Compress-Archive -Path "publish/framework-dependent/*" -DestinationPath "artifacts/GameAutomation-FrameworkDependent-win-x64.zip"
        Write-Host "📦 Packages created successfully"
      shell: pwsh
        
    - name: Upload self-contained artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameAutomation-SelfContained-win-x64
        path: artifacts/GameAutomation-SelfContained-win-x64.zip
        retention-days: 90
        
    - name: Upload framework-dependent artifact
      uses: actions/upload-artifact@v4
      with:
        name: GameAutomation-FrameworkDependent-win-x64
        path: artifacts/GameAutomation-FrameworkDependent-win-x64.zip
        retention-days: 90
        
    - name: Upload release assets (on release)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/GameAutomation-SelfContained-win-x64.zip
          artifacts/GameAutomation-FrameworkDependent-win-x64.zip